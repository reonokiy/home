---
# Remote AlmaLinux host settings.
hypervisor_host: "{{ groups['hypervisors'][0] }}"

# AlmaLinux VM image.
almalinux_version: "10"
almalinux_cloud_image_url: "https://repo.almalinux.org/almalinux/10/cloud/x86_64/images/AlmaLinux-10-GenericCloud-latest.x86_64.qcow2"
almalinux_image_cache_dir: "{{ libvirt_pool_path }}/images"

# VM sizing.
rke2_vm_memory_mb: 4096
rke2_vm_vcpus: 2
rke2_vm_disk_size_gb: 40

# Remote libvirt storage on the AlmaLinux hypervisor.
# AlmaLinux VM qcow2 disks and cached cloud images live under this directory.
libvirt_pool_name: "rke2"
libvirt_pool_path: "/var/lib/libvirt/images/rke2"

# VM networking.
# Use "nat" for libvirt's managed NAT network, or "bridge" for an existing host bridge.
libvirt_vm_network_mode: "nat"
libvirt_vm_network_name: "default"
libvirt_vm_bridge_name: "virbr0"
libvirt_machine_type: "pc"

# Cloud-init SSH access for VM-internal Ansible management.
rke2_vm_user: "ansible"
rke2_vm_ssh_public_key: "ssh-rsa  acbqivycgs@gadmin03"

# RKE2 role settings. See lablabs.rke2 defaults for all supported variables.
rke2_version: "v1.35.1+rke2r1"
rke2_token: "change-me-rke2-token"
rke2_ha_mode: false
rke2_download_kubeconf: true
rke2_download_kubeconf_path: "{{ playbook_dir }}/../generated"
rke2_download_kubeconf_file_name: "rke2.yaml"
rke2_api_ip: "{{ hostvars[groups['masters'][0]].ansible_host }}"
rke2_server_node_taints:
  - "CriticalAddonsOnly=true:NoExecute"
