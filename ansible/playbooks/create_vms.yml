---
- name: Create AlmaLinux RKE2 virtual machines
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../config/cluster.yml

  tasks:
    - name: Create AlmaLinux cloud-init VM domains
      community.libvirt.virt_cloud_instance:
        name: "{{ item }}"
        base_image: "{{ almalinux_cloud_image_url }}"
        image_cache_dir: "{{ almalinux_image_cache_dir }}"
        disks:
          - path: "{{ libvirt_pool_path }}/{{ item }}.qcow2"
            size: "{{ rke2_vm_disk_size_gb }}"
            format: qcow2
        memory: "{{ rke2_vm_memory_mb }}"
        vcpus: "{{ rke2_vm_vcpus }}"
        networks: >-
          {{
            [
              {
                'network': libvirt_vm_network_name,
                'mac': {'address': hostvars[item].vm_mac},
                'model': {'type': 'virtio'}
              }
            ]
            if libvirt_vm_network_mode == 'nat'
            else
            [
              {
                'bridge': libvirt_vm_bridge_name,
                'mac': {'address': hostvars[item].vm_mac},
                'model': {'type': 'virtio'}
              }
            ]
          }}
        cloud_init:
          user_data: "{{ lookup('template', '../templates/almalinux-cloud-init-user-data.yaml.j2') }}"
          meta_data:
            instance-id: "{{ item }}"
            local-hostname: "{{ item }}"
          network_config: "{{ lookup('template', '../templates/almalinux-cloud-init-network-config.yaml.j2') }}"
          disable: true
        wait_for_cloud_init_reboot: false
        autostart: true
        state: present
      loop: "{{ groups['k8s_cluster'] }}"

    - name: Start AlmaLinux VM domains
      community.libvirt.virt:
        name: "{{ item }}"
        state: running
        autostart: true
      loop: "{{ groups['k8s_cluster'] }}"
