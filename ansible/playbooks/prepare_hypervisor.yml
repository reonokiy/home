---
- name: Prepare AlmaLinux hypervisor for RKE2 VMs
  hosts: hypervisors
  become: true
  gather_facts: true
  vars_files:
    - ../config/cluster.yml

  tasks:
    - name: Install KVM/libvirt packages
      ansible.builtin.dnf:
        name:
          - qemu-kvm
          - libvirt
          - virt-install
          - qemu-img
          - python3-libvirt
          - python3-lxml
          - libvirt-daemon-config-network
        state: present

    - name: Enable and start libvirtd
      ansible.builtin.service:
        name: libvirtd
        state: started
        enabled: true

    - name: Enable default libvirt NAT network for virbr0
      community.libvirt.virt_net:
        name: "{{ libvirt_nat_network_name }}"
        state: active
        autostart: true
      when: libvirt_network_bridge == "virbr0"

    - name: Read default libvirt NAT network XML
      community.libvirt.virt_net:
        name: "{{ libvirt_nat_network_name }}"
        command: get_xml
      register: libvirt_nat_network_xml
      changed_when: false
      when: libvirt_network_bridge == "virbr0"

    - name: Add RKE2 VM DHCP reservations to default libvirt NAT network
      community.libvirt.virt_net:
        name: "{{ libvirt_nat_network_name }}"
        command: modify
        xml: "<host mac='{{ hostvars[item].vm_mac }}' name='{{ item }}' ip='{{ hostvars[item].ansible_host }}'/>"
      loop: "{{ groups['k8s_cluster'] }}"
      when:
        - libvirt_network_bridge == "virbr0"
        - hostvars[item].vm_mac not in libvirt_nat_network_xml.get_xml

    - name: Ensure RKE2 storage directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ libvirt_pool_path }}"
        - "{{ almalinux_image_cache_dir }}"

    - name: Define RKE2 libvirt storage pool
      community.libvirt.virt_pool:
        name: "{{ libvirt_pool_name }}"
        command: define
        xml: "{{ lookup('template', '../templates/libvirt-pool.xml.j2') }}"

    - name: Start RKE2 libvirt storage pool
      community.libvirt.virt_pool:
        name: "{{ libvirt_pool_name }}"
        state: active
        autostart: true
